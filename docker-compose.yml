version: '3.8'

services:
  # Backend Node.js (API de Prospecção, IA, WhatsApp)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: implotter-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - .env
    networks:
      - implotter-network

  # Frontend Vite compilado (servido pelo Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: implotter-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - implotter-network

networks:
  implotter-network:
    driver: bridge
